<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="display">
            <div id = "lastValue">0</div>
            <div id = "inputValue">0</div>
        </div>
        <div class="keys">
            <button class="reset span-two">AC</button>
            <button class="reset-c">C</button>
            <button id = "divide" class="operator">/</button>
            <button class="number-btn">7</button>
            <button class="number-btn">8</button>
            <button class="number-btn">9</button>
            <button id = "multiply" class="operator">*</button>
            <button class="number-btn">4</button>
            <button class="number-btn">5</button>
            <button class="number-btn">6</button>
            <button id = "subtract" class="operator">-</button>
            <button class="number-btn">1</button>
            <button class="number-btn">2</button>
            <button class="number-btn">3</button>   
            <button id = "add" class="operator">+</button>
            <button class="number-btn span-two">0</button>
            <button class="number-btn">.</button>
            <button class="ravno">=</button>
        </div> 
    </div>
</body>
</html>
